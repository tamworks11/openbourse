name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pipx install poetry==2.3.2
      - name: Cache Poetry env
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - name: Install
        run: poetry install --with dev
      - name: Ruff lint
        run: poetry run ruff check .
      - name: Ruff format check
        run: poetry run ruff format --check .
      - name: Mypy
        run: poetry run mypy src

  unit:
    name: unit tests (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install Poetry
        run: pipx install poetry==2.3.2
      - name: Install
        run: poetry install --with dev
      - name: Run unit tests
        run: poetry run pytest -m "not integration" --cov-report=xml

  integration:
    name: integration tests (postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openbourse
          POSTGRES_PASSWORD: openbourse
          POSTGRES_DB: openbourse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openbourse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pipx install poetry==2.3.2
      - name: Install
        run: poetry install --with dev
      - name: Run integration tests
        env:
          OPENBOURSE_TEST_DATABASE_URL: postgresql+asyncpg://openbourse:openbourse@localhost:5432/openbourse_test
        run: poetry run pytest -m integration
