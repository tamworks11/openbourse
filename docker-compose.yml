services:
  postgres:
    image: postgres:16-alpine
    container_name: openbourse-postgres
    environment:
      POSTGRES_USER: openbourse
      POSTGRES_PASSWORD: openbourse
      POSTGRES_DB: openbourse
    ports:
      - "5432:5432"
    volumes:
      - openbourse-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openbourse -d openbourse"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  openbourse-pg-data:
